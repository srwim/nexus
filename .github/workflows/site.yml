name: Build & publish site

on:
  push:
    branches: [main]
  schedule:
    - cron: "*/30 * * * *" # refresh news every 30 minutes
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10 # a hung network call can never stall the runner for hours
    env:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Set base path from repo name
        run: |
          if [[ "${{ github.event.repository.name }}" == *.github.io ]]; then
            echo "PAGES_BASE_PATH=" >> "$GITHUB_ENV"
          else
            echo "PAGES_BASE_PATH=/${{ github.event.repository.name }}" >> "$GITHUB_ENV"
          fi
      - run: npm ci
      # Semantic de-dup model, installed OUTSIDE npm ci so a failure here can
      # never break the site build — scripts/build-data.mjs falls back to
      # lexical de-dup if the package isn't present.
      - name: Install semantic dedup model (best-effort)
        run: npm install --no-save @xenova/transformers@2.17.2 || echo "semantic model unavailable — continuing with lexical dedup"
      - name: Fetch news data
        run: node scripts/build-data.mjs
      - name: Build static site
        run: npm run build
        env:
          # Repo variable (Settings → Secrets and variables → Actions → Variables).
          # Baked into the client bundle; public by design.
          NEXT_PUBLIC_LOCAL_NEWS_PROXY: ${{ vars.LOCAL_NEWS_PROXY }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out
      # Mirrors each fresh build to your own web host (e.g. arok.ai/nexus).
      # Runs only when the FTP_* secrets are set; harmless otherwise.
      - name: Publish to web host via FTP
        if: ${{ env.FTP_SERVER != '' }}
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: out/
          server-dir: ./

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
